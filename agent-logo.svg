<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0F6CBD"/>

  <!-- Bar chart -->
  <rect x="10" y="36" width="9" height="16" rx="2" fill="#FFFFFF" opacity="0.6"/>
  <rect x="22" y="26" width="9" height="26" rx="2" fill="#FFFFFF" opacity="0.8"/>
  <rect x="34" y="18" width="9" height="34" rx="2" fill="#FFFFFF"/>

  <!-- Pulse line over bars -->
  <polyline
    points="46,30 50,22 54,28"
    fill="none"
    stroke="#47D7AC"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>
  <circle cx="46" cy="30" r="2" fill="#47D7AC"/>
  <circle cx="54" cy="28" r="2" fill="#47D7AC"/>
</svg>
